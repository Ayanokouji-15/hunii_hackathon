<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hunii | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesd.css') }}">
</head>
<body>
    <div class="theme-switch-wrapper">
        <span>Dark Mode</span>
        <label class="switch">
            <input type="checkbox" id="theme-checkbox" onclick="toggleDark()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="landing-container">
        <div class="table-container" style="max-width: 400px;">
            <h1>hunii</h1>
            <p>Welcome back! Please login.</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}{% for m in messages %}<p style="color:#ff4d4d; font-weight:bold;">{{ m }}</p>{% endfor %}{% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
            
            <p style="margin-top: 20px;">New here? <a href="{{ url_for('register') }}" class="btn-secondary" style="margin:0;">Create an Account</a></p>
        </div>
    </div>

    <script>
        function toggleDark() {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
        }
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            document.getElementById("theme-checkbox").checked = true;
        }
    </script>
</body>
</html>
